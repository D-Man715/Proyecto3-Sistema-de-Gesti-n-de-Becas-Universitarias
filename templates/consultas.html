<!-- Modal -->
<div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered"> <div class="modal-content login-card-dark">
      
      <div class="modal-header border-0 justify-content-center position-relative pt-4">
        <h3 class="modal-title w-100 text-center text-white fw-bold" id="staticBackdropLabel">Login</h3>

            <input type="text" id="username" class="form-control bg-transparent text-white custom-input ps-0" placeholder="admin">

          </div>
        </div>

        <div class="mb-3">
          <label class="form-label text-white fw-semibold mb-1">Contraceña</label>
          <div class="d-flex align-items-center input-password-box px-3 py-1">
            <input type="password" id="password" class="form-control bg-transparent text-white custom-input ps-0" value="123">
            <i class="bi bi-eye-slash text-white fs-5"></i>
          </div>
        </div>
        <button class="btn btn-fucsia-main w-100 fw-bold py-2 mb-2" onclick="login()">Iniciar sesion</button>
        <button type="button" class="btn btn-outline-dark w-100" onclick="logout()">Cerrar sesión</button>

<div class="container mt-4">
  <h2 class="mb-3">Postulaciones Pendientes</h2>
  <p class="text-muted">Estudiantes que aún no han sido evaluados por la universidad.</p>
  <table class="table table-bordered table-hover" id="tablaPendientes">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Nombres</th>
        <th>Apellidos</th>
        <th>Beca</th>
        <th>Fecha</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody id="cuerpoTabla">
    </tbody>
  </table>
</div>

<script>
  fetch('/consultas/pendientes')
    .then(res => res.json())
    .then(data => {
      const tbody = document.getElementById('cuerpoTabla');
      data.forEach((item, i) => {
        tbody.innerHTML += `
          <tr>
            <td>${i+1}</td>
            <td>${item.nombres}</td>
            <td>${item.apellidos}</td>
            <td>${item.nombre_beca}</td>
            <td>${item.fecha_postulacion}</td>
            <td><span class="badge bg-warning text-dark">${item.estado}</span></td>
          </tr>`;
      });
    });
</script>
