<div class="modal fade" id="staticBackdrop1" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="staticBackdropLabel">Actualisar el Documento</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit_id_documento">
        <label>Id_postulacion</label>
                <input type="text" id="id_postulacion1" class="form-control">
                <label>tipo_documento</label>
                <input type="text" id="tipo_documento1" class="form-control">
                <label>Archivo</label>
                <input type="text" id="url_archivo1" class="form-control">
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Canselar</button>
        <button type="button" class="btn btn-primary" onclick="Actualizar(document.getElementById('edit_id_documento').value)">
          Actulisar
        </button>
      </div>
    </div>
  </div>
</div>





    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        const token = localStorage.getItem('token');
        const tabla = document.getElementById('tabla-documentos');
       const miModal = document.getElementById('staticBackdrop1');

          miModal.addEventListener('show.bs.modal', function (event) {
            // 1. Detecta qué botón de la tabla abrió el modal
            const botonPresionado = event.relatedTarget;
    
            // 2. Extrae el id_documento del atributo data-bs-id
             const idDocumento = botonPresionado.getAttribute('data-bs-id');
    
            // 3. Lo guarda en el input para que esté listo cuando se presione actualizar
           document.getElementById('edit_id_documento').value = idDocumento;
});
        
//------------------------------POST---------------------------------------
        function enviar(){
          if (!token) {
            alert("Debe iniciar sesión");
            window.location.href = "/";
        }
             fetch('/documentos',{
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    id_postulacion: document.getElementById('id_postulacion').value,
                    tipo_documento: document.getElementById('tipo_documento').value,
                    url_archivo: document.getElementById('url_archivo').value
                })
            })
            .then(res => res.json())
            .then(data => {
              console.log("Deves iniciar secion:", data)
                alert(data.mensaje);
            });
        }
//------------------------------GET---------------------------------------
            fetch('/documentos', {
            method: 'GET',
            headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(response => response.json())
            .then(data => {
                const tabla = document.getElementById('tabla-documentos');
                tabla.innerHTML = '';

                data.forEach(documento => {
                    tabla.innerHTML += `
                        <tr>
                            <td>${documento.id_documento}</td>
                            <td>${documento.id_postulacion}</td>
                            <td>${documento.tipo_documento}</td>
                            <td>${documento.url_archivo}</td>
                            <td>
                                
                                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop1" data-bs-id="${documento.id_documento}">Editar</button>
                                <button class="btn btn-danger btn-sm" onclick="eliminar(${documento.id_documento})"> Eliminar </button>
                              </td>
                        </tr>
                    `;
                });
            })
            .catch(error => console.error('Error:', error));
        //} 
//------------------------------PUT--------------------------------------- 
function Actualizar(id){
         if (!token) {
            alert("Debe iniciar sesión");
            //location.reload();
            window.location.href = "/"
        }else{

            guardarCambios(id);
        }
      }
function guardarCambios(id){
      const idPostulacion = document.getElementById('id_postulacion1').value;
      const tipoDocumento = document.getElementById('tipo_documento1').value; 
       const urlArchivo = document.getElementById('url_archivo1').value;
            fetch('/documentos/' + id,{
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({
                    id_postulacion: idPostulacion,
                    tipo_documento: tipoDocumento,
                    url_archivo: urlArchivo
                })
            })
            .then(res => res.json())
            .then(data => {
                alert(data.mensaje);
                window.location.href = '/';
            });
        }







   //------------------------------DELETE---------------------------------------     
      function eliminar(id){
         if (!token) {
            alert("Debe iniciar sesión");
            //location.reload();
            window.location.href = "/"
        }else{
            eliminardocumentos(id);
        }
      }
       function eliminardocumentos(id) {
            //alert("Eliminar documento con ID: " + id);

            const confirmar = confirm("Esta seguro de eliminar la documentos?");
             console.log(confirmar);
            if(!confirmar){
                location.reload();;
                //return;
            }else{
                const token = localStorage.getItem('token');
                fetch('/documentos/' + id,
                    {
                        method: 'DELETE',
                        headers:{'Authorization':'Bearer ' + token}
                    }
                )
                .then(res => res.json())
                .then(data => {
                    alert(data.mensaje);
                    //window.location.href = "/";
                    location.reload()
                })
                .catch(error => console.error(error));
          }
        }
    </script>
